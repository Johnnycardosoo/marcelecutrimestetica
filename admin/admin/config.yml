backend:
  name: github
  repo: Johnnycardosoo/marcelecutrimestetica
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - label: "Página Principal"
        name: "home"
        file: "index.html"
        fields:
          - { label: "Título", name: "title", widget: "string" }
