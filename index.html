<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#080510" />
  <title>Marcele Cutrim Estética e Bem Estar</title>

  <style>
    :root{
      --bg: #080510;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.14);
      --text: #eef2ff;
      --muted: rgba(238,242,255,.72);
      --shadow: 0 18px 55px rgba(0,0,0,.45);
      --radius: 26px;
      --radius2: 18px;
      --accent: #4f9dff;
      --accent2: #6ee7b7;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background:
        radial-gradient(900px 500px at 20% 15%, rgba(79,157,255,.18), transparent 62%),
        radial-gradient(760px 420px at 78% 18%, rgba(110,231,183,.14), transparent 60%),
        radial-gradient(900px 520px at 50% 95%, rgba(167,139,250,.12), transparent 68%),
        linear-gradient(180deg, #05030a, #0b0a16);
      overflow-x:hidden;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 26px 18px 70px;
      position: relative;
    }

    /* floating cards */
    .bg-float{
      position:absolute;
      inset: -40px -60px auto -60px;
      height: 260px;
      pointer-events:none;
      opacity: .9;
      filter: blur(0px);
    }
    .float-card{
      position:absolute;
      width: 110px;
      height: 76px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      transform: rotate(-6deg);
      animation: drift 10s ease-in-out infinite;
    }
    .float-card:nth-child(1){ left: 48px; top: 36px; animation-delay: 0s; }
    .float-card:nth-child(2){ left: 190px; top: 18px; transform: rotate(8deg); animation-delay: -2.5s; }
    .float-card:nth-child(3){ left: 340px; top: 46px; transform: rotate(-2deg); animation-delay: -5s; }

    @keyframes drift{
      0%,100%{ transform: translateY(0) rotate(var(--r, -6deg)); }
      50%{ transform: translateY(10px) rotate(var(--r, -6deg)); }
    }

    .hero{
      position:relative;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      box-shadow: var(--shadow);
      overflow:hidden;
      padding: 22px 20px;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(550px 220px at 14% 18%, rgba(79,157,255,.18), transparent 60%),
        radial-gradient(520px 220px at 86% 12%, rgba(110,231,183,.12), transparent 62%);
      filter: blur(18px);
      opacity:.95;
      pointer-events:none;
    }
    .hero-inner{
      position:relative;
      display:flex;
      gap: 16px;
      align-items:center;
    }

    .avatar{
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      flex: 0 0 auto;
      display:grid;
      place-items:center;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .title{
      margin:0;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: .2px;
    }
    .subtitle{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .status{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
      flex: 0 0 auto;
    }
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 6px rgba(52,211,153,.15);
    }
    .status span{
      color: rgba(238,242,255,.9);
      font-size: 12px;
      white-space:nowrap;
    }

    .grid{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }

    .card{
      grid-column: span 12;
      border-radius: var(--radius2);
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow: 0 14px 40px rgba(0,0,0,.30);
      overflow:hidden;
      transform: translateZ(0);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .card:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 18px 50px rgba(0,0,0,.34);
    }
    .card a{
      display:flex;
      align-items:center;
      gap: 14px;
      padding: 16px 16px;
      text-decoration:none;
      color:inherit;
    }

    .ico{
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      flex: 0 0 auto;
    }

    .txt{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width:0;
    }
    .txt strong{
      font-size: 16px;
      letter-spacing:.2px;
    }
    .txt span{
      font-size: 13px;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pill{
      margin-left:auto;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(238,242,255,.9);
      font-size: 12px;
      display:flex;
      align-items:center;
      gap: 8px;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    .pill .dot{
      width: 9px;
      height: 9px;
      box-shadow: 0 0 0 5px rgba(52,211,153,.14);
    }

    /* highlighted buttons */
    .buttons{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn{
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      font-weight: 800;
      letter-spacing:.2px;
      cursor:pointer;
      text-decoration:none;
      color:inherit;
      box-shadow: 0 18px 44px rgba(0,0,0,.34);
      transition: transform .16s ease, box-shadow .18s ease, border-color .18s ease;
      will-change: transform;
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 22px 56px rgba(0,0,0,.38);
    }
    .btn-primary{
      background: linear-gradient(135deg, rgba(79,157,255,.30), rgba(79,157,255,.14));
      border-color: rgba(79,157,255,.34);
    }
    .btn-primary:hover{ border-color: rgba(79,157,255,.55); }
    .btn-green{
      background: linear-gradient(135deg, rgba(110,231,183,.26), rgba(110,231,183,.12));
      border-color: rgba(110,231,183,.34);
    }
    .btn-green:hover{ border-color: rgba(110,231,183,.55); }

    .footer{
      margin-top: 16px;
      text-align:center;
      color: rgba(238,242,255,.55);
      font-size: 12px;
    }

    /* Particles (animações decorativas) */
    .particle{
      position: fixed;
      left: 0;
      top: 0;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      pointer-events:none;
      opacity: .75;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255,255,255,.0) 70%);
      filter: blur(.2px);
      transform: translate3d(-999px,-999px,0);
      z-index: 0;
    }

    /* Burst symbols (click effect) */
    .burst-symbol{
      position: fixed;
      left: 0;
      top: 0;
      pointer-events:none;
      font-weight: 800;
      opacity: .95;
      transform: translate3d(-999px,-999px,0) scale(1);
      z-index: 50;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.35));
      will-change: transform, opacity;
    }

    @media (max-width: 520px){
      .title{ font-size: 22px; }
      .buttons{ grid-template-columns: 1fr; }
      .hero-inner{ align-items:flex-start; }
      .avatar{ width: 64px; height: 64px; border-radius: 16px; }
      .status{ margin-left: 0; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="bg-float" aria-hidden="true">
      <div class="float-card" style="--r:-6deg"></div>
      <div class="float-card" style="--r:8deg"></div>
      <div class="float-card" style="--r:-2deg"></div>
    </div>

    <section class="hero" aria-label="Cabeçalho">
      <div class="hero-inner">
        <div class="avatar" aria-hidden="true">
          <img src="assets/img_01.webp" alt="Logo" loading="eager" decoding="async">
        </div>

        <div style="min-width:0;">
          <h1 class="title">Marcele Cutrim<br/>Estética e Bem Estar</h1>
          <p class="subtitle">Atendimento, informações e rotas — tudo em um clique.</p>
        </div>

        <div class="status" title="Status">
          <span class="dot"></span>
          <span>Acesso recente</span>
        </div>
      </div>
    </section>

    <section class="grid" aria-label="Ações rápidas">
      <div class="card">
        <a href="https://wa.me/5598983411260" target="_blank" rel="noopener">
          <div class="ico" aria-hidden="true">💬</div>
          <div class="txt">
            <strong>WhatsApp</strong>
            <span>Agendar e tirar dúvidas</span>
          </div>
          <span class="pill"><span class="dot"></span> Abrir</span>
        </a>
      </div>

      <div class="card">
        <a href="https://instagram.com/" target="_blank" rel="noopener">
          <div class="ico" aria-hidden="true">📸</div>
          <div class="txt">
            <strong>Instagram</strong>
            <span>Ver trabalhos e novidades</span>
          </div>
          <span class="pill"><span class="dot"></span> Abrir</span>
        </a>
      </div>
    </section>

    <section class="buttons" aria-label="Botões principais">
      <!-- ✅ COMO CHEGAR (corrigido para usar o NOME da clínica + coordenadas exatas) -->
      <a class="btn btn-primary"
         href="https://www.google.com/maps/dir/?api=1&destination=Marcele%20Cutrim%20Est%C3%A9tica%20e%20Bem%20Estar&destination_latlng=-2.5627358%2C-44.3337477&dir_action=navigate&travelmode=driving"
         target="_blank" rel="noopener">
        🧭 Como chegar
      </a>

      <a class="btn btn-green"
         href="tel:+5598983411260"
         target="_blank" rel="noopener">
        📞 Ligar
      </a>
    </section>

    <p class="footer">© <span id="year"></span> Marcele Cutrim Estética e Bem Estar</p>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
    // === Click Burst (animação ao clicar) ===
    const BURST_SYMBOLS = ["✦","✺","✧","✹","✶","✸","✷","✵"];
    const BURST_COLORS  = ["#60a5fa","#34d399","#a78bfa","#f472b6","#fbbf24"];
    function rand(min, max){ return Math.random() * (max - min) + min; }

    function spawnBurst(x, y){
      const count = 10;
      for(let i=0;i<count;i++){
        const el = document.createElement("div");
        el.className = "burst-symbol";
        el.textContent = BURST_SYMBOLS[Math.floor(Math.random()*BURST_SYMBOLS.length)];
        el.style.color = BURST_COLORS[Math.floor(Math.random()*BURST_COLORS.length)];
        document.body.appendChild(el);

        const angle = rand(0, Math.PI*2);
        const dist  = rand(20, 70);
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;

        el.style.left = x + "px";
        el.style.top  = y + "px";
        el.style.transform = "translate(-50%,-50%) scale(1)";

        const start = performance.now();
        const dur = rand(520, 820);

        function anim(t){
          const p = Math.min(1, (t - start) / dur);
          const ease = 1 - Math.pow(1 - p, 3);
          const cx = dx * ease;
          const cy = dy * ease;
          const s  = 1 + 0.4 * (1 - p);
          el.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px)) scale(${s})`;
          el.style.opacity = String(1 - p);
          if(p < 1) requestAnimationFrame(anim);
          else el.remove();
        }
        requestAnimationFrame(anim);
      }
    }

    document.addEventListener("pointerdown", (e) => {
      // evita clique direito/scroll
      if(e.button && e.button !== 0) return;
      spawnBurst(e.clientX, e.clientY);
    }, {passive:true});
  </script>

  <script>
    // === Floating Particles (animação contínua) ===
    const particles = [];
    const MAX = 18;

    function createParticle(){
      const el = document.createElement("div");
      el.className = "particle";
      document.body.appendChild(el);

      const p = {
        el,
        x: rand(0, window.innerWidth),
        y: window.innerHeight + rand(10, 120),
        r: rand(6, 12),
        vy: rand(0.20, 0.55),
        vx: rand(-0.10, 0.10),
        o: rand(0.25, 0.75)
      };

      el.style.width  = p.r + "px";
      el.style.height = p.r + "px";
      el.style.opacity = p.o;
      particles.push(p);
    }

    for(let i=0;i<MAX;i++) createParticle();
    setInterval(() => {
      if(particles.length < MAX) createParticle();
    }, 1800);

    function tick(){
      for(const p of particles){
        p.y -= p.vy * 60;
        p.x += p.vx * 60;
        if(p.y < -120){
          p.y = window.innerHeight + rand(10, 120);
          p.x = rand(0, window.innerWidth);
        }
        p.el.style.transform = `translate3d(${p.x}px, ${p.y}px, 0)`;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    window.addEventListener("resize", () => {
      // reposiciona suavemente
      for(const p of particles){
        p.x = Math.min(p.x, window.innerWidth - 10);
        p.y = Math.min(p.y, window.innerHeight + 140);
      }
    }, {passive:true});
  </script>
</body>
</html>
